name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Build the book
        run: mdbook build book

      # Built with the workspace's own [patch.crates-io] (the pinned imgui-rs
      # fork), so the decorator docs reflect the actual supported Dear ImGui
      # version. docs.rs cannot do this today — it builds against stock
      # imgui-sys, which is not the version this crate's decorators target.
      - name: Build API docs
        run: cargo doc --no-deps --all-features -p imgui-painter

      # Ask cargo where the target directory actually is rather than assuming.
      # Hardcoding it broke once already: adding the workspace root moved the
      # target dir from bindings/rust/target to the root, and this step kept
      # copying from the old path.
      - name: Assemble site
        run: |
          set -euo pipefail
          doc_dir="$(cargo metadata --format-version 1 --no-deps | \
            python3 -c 'import json,sys; print(json.load(sys.stdin)["target_directory"])')/doc"
          test -d "$doc_dir" || { echo "::error::rustdoc output not found at $doc_dir"; exit 1; }
          test -f "$doc_dir/imgui_painter/index.html" || {
            echo "::error::rustdoc output at $doc_dir has no imgui_painter crate docs"; exit 1; }
          mkdir -p site/api
          cp -r book/book/. site/
          cp -r "$doc_dir"/. site/api/
          test -f site/index.html && test -f site/api/imgui_painter/index.html
          echo "Assembled: book at /, rustdoc at /api/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
